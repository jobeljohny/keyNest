<div class="shell">
  <app-topbar (export)="exportVault()" (importFile)="onImportFile($event)" />

  <main class="content">
    <app-vault-toolbar
      [query]="query()"
      (queryChange)="query.set($event)"
      (add)="openAdd()"
    />

    <section class="grid">
      @for (credential of filtered(); track credential.id) {
        <app-credential-card
          [credential]="credential"
          (edit)="openEdit($event)"
          (remove)="onDelete($event)"
        />
      } @empty {
        <div class="grid__empty">
          @if (hasAny()) {
            <app-empty-state
              icon="🔍"
              title="No matches"
              [body]="'Nothing matches “' + query() + '”. Try a different name or username.'"
            />
          } @else {
            <app-empty-state
              icon="🪺"
              title="Your nest is empty"
              body="KeyNest keeps every credential right here in your browser, nothing is ever sent to a server. Add your first one to get started."
              actionLabel="Add your first credential"
              (action)="openAdd()"
            />
          }
        </div>
      }
    </section>
  </main>

  @if (modalOpen()) {
    <app-credential-modal
      [editing]="editing()"
      (save)="onSave($event)"
      (close)="closeModal()"
    />
  }

  <app-toast />
</div>
