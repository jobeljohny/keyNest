<article class="card">
  <header class="card__head">
    <div class="card__avatar" aria-hidden="true">{{ credential().name.charAt(0).toUpperCase() }}</div>
    <div class="card__id">
      <h3 class="card__name">{{ credential().name }}</h3>
      <p class="card__user">{{ credential().username }}</p>
    </div>
  </header>

  <div class="card__pw">
    <span class="card__pw-value mono">
      {{ revealed() ? credential().password : maskedPassword() }}
    </span>
    <button
      type="button"
      class="icon-btn icon-btn--sm card__reveal"
      [class.card__reveal--on]="revealed()"
      [attr.aria-label]="revealed() ? 'Hide password' : 'Show password'"
      (click)="toggleReveal()"
    >
      @if (revealed()) {
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a20.6 20.6 0 0 1 5.06-5.94M9.9 4.24A11 11 0 0 1 12 4c7 0 11 8 11 8a20.7 20.7 0 0 1-2.16 3.19M1 1l22 22M9.9 9.9a3 3 0 0 0 4.2 4.2" />
        </svg>
      } @else {
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      }
    </button>
  </div>

  @if (confirmingDelete()) {
    <div class="card__confirm">
      <span>Delete this credential?</span>
      <div class="card__confirm-actions">
        <button type="button" class="btn btn--ghost btn--sm" (click)="cancelDelete()">Cancel</button>
        <button type="button" class="btn btn--danger btn--sm" (click)="confirmDelete()">Delete</button>
      </div>
    </div>
  } @else {
    <footer class="card__actions">
      <button type="button" class="action" (click)="copy('username')" aria-label="Copy username" title="Copy username">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6 9 17l-5-5" style="display:none" />
          <rect x="9" y="9" width="13" height="13" rx="2" />
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
        </svg>
        <span>User</span>
      </button>
      <button type="button" class="action" (click)="copy('password')" aria-label="Copy password" title="Copy password">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        <span>Pass</span>
      </button>
      <button type="button" class="action" (click)="share()" aria-label="Copy share text" title="Copy share text">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3" />
          <circle cx="6" cy="12" r="3" />
          <circle cx="18" cy="19" r="3" />
          <path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4" />
        </svg>
        <span>Share</span>
      </button>
      <span class="action-spacer"></span>
      <button type="button" class="icon-btn icon-btn--sm" (click)="onEdit()" aria-label="Edit" title="Edit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
        </svg>
      </button>
      <button type="button" class="icon-btn icon-btn--sm icon-btn--danger" (click)="askDelete()" aria-label="Delete" title="Delete">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
        </svg>
      </button>
    </footer>
  }
</article>
