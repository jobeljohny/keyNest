<div
  class="backdrop"
  (click)="onBackdrop($event)"
  (keydown.escape)="close.emit()"
  tabindex="-1"
>
  <div
    class="modal"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="isEditing ? 'Edit credential' : 'Add credential'"
  >
    <header class="modal__head">
      <h2 class="modal__title">{{ isEditing ? 'Edit credential' : 'Add credential' }}</h2>
      <button type="button" class="icon-btn" aria-label="Close" (click)="close.emit()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    </header>

    <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <label class="field">
        <span class="field__label">Name</span>
        <input
          class="input"
          type="text"
          formControlName="name"
          placeholder="e.g. GitHub"
          autocomplete="off"
          autofocus
        />
        @if (form.controls['name'].touched && form.controls['name'].invalid) {
          <span class="field__error">Name is required.</span>
        }
      </label>

      <label class="field">
        <span class="field__label">Username</span>
        <input
          class="input"
          type="text"
          formControlName="username"
          placeholder="e.g. jane@example.com"
          autocomplete="off"
        />
        @if (form.controls['username'].touched && form.controls['username'].invalid) {
          <span class="field__error">Username is required.</span>
        }
      </label>

      <label class="field">
        <span class="field__label">Password</span>
        <div class="input-group">
          <input
            class="input input--pw mono"
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••••"
            autocomplete="off"
          />
          <button
            type="button"
            class="icon-btn icon-btn--inset"
            [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
            (click)="togglePassword()"
          >
            @if (showPassword()) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a20.6 20.6 0 0 1 5.06-5.94M9.9 4.24A11 11 0 0 1 12 4c7 0 11 8 11 8a20.7 20.7 0 0 1-2.16 3.19M1 1l22 22M9.9 9.9a3 3 0 0 0 4.2 4.2" />
              </svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
          </button>
        </div>
        @if (form.controls['password'].touched && form.controls['password'].invalid) {
          <span class="field__error">Password is required.</span>
        }
      </label>

      <footer class="modal__foot">
        <button type="button" class="btn btn--ghost" (click)="close.emit()">Cancel</button>
        <button type="submit" class="btn btn--primary">
          {{ isEditing ? 'Save changes' : 'Add credential' }}
        </button>
      </footer>
    </form>
  </div>
</div>
