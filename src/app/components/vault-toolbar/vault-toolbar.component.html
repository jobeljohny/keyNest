<section class="toolbar">
  <div class="search">
    <svg class="search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="7" />
      <path d="m21 21-4.3-4.3" />
    </svg>
    <input
      class="search__input"
      type="search"
      placeholder="Search by name or username…"
      [value]="query()"
      (input)="onInput($event)"
      aria-label="Search credentials"
    />
  </div>
  <button type="button" class="btn btn--primary toolbar__add" (click)="add.emit()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <path d="M12 5v14M5 12h14" />
    </svg>
    <span>Add credential</span>
  </button>
</section>
